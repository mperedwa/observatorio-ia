name: Watch ILIA (Índice Latinoamericano de IA)

# Monitor mensual del CENIA Chile (https://indicelatam.cl/) que publica el
# ILIA cada año entre agosto y octubre. El script detecta señales de
# nueva edición o cambio de PDF y avisa por Telegram. NO actualiza el
# catálogo automáticamente — la actualización del ranking de Costa Rica
# en `indicadores.json` requiere lectura editorial del PDF nuevo.

on:
  schedule:
    # Día 1 de cada mes a las 12:00 UTC (06:00 CR / 07:00 ET)
    - cron: '0 12 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch-ilia:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ILIA watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run watch:ilia

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain scraper-runs/ilia-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scraper-runs/ilia-state.json
            git commit -m "chore(ilia-watch): actualiza estado tras chequeo mensual"
            git push
          fi
