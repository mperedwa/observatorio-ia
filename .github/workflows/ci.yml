name: CI

# Corre en cada push a main y en cada PR. Bloquea merges si:
#   - typecheck de la app (next + páginas) rompe
#   - typecheck de scripts/scrapers/tests rompe
#   - tests de vitest rompen
#
# Dos tsconfigs porque next-plugin necesita estar restringido a la app y
# scripts/scrapers tienen otro shape (sin React, target node).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck app
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck scripts + scrapers + tests
        run: npx tsc --noEmit -p tsconfig.scripts.json

      - name: Tests
        run: npm test
