name: Scrape fuentes oficiales

on:
  schedule:
    # Lunes, miércoles y viernes a las 12:00 UTC (06:00 CR)
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch:
    inputs:
      notify_threshold:
        description: 'Score mínimo para notificar Telegram (default 7, baja a 5 o 3 para tests)'
        required: false
        default: '7'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        id: scrape
        env:
          # Opcional: si el secret está configurado, los candidatos se enriquecen con Llama 3.3 70B vía Groq.
          # Sin el secret, el workflow funciona en modo Fase 5 (lista plana de candidatos sin score).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run scrape:all

      - name: Validate data after scrape
        run: npm run validate-data

      - name: Notify Telegram (filtrado)
        env:
          # Opcional: si ambos secrets están configurados, manda mensaje al bot SOLO si
          # hay cambios aplicados al JSON o ≥1 candidato con score ≥ NOTIFY_SCORE_THRESHOLD.
          # Default threshold 7. Para tests usar workflow_dispatch input notify_threshold.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_SCORE_THRESHOLD: ${{ inputs.notify_threshold || '7' }}
        run: npm run notify-telegram

      - name: Classify candidates vs repo (proyectos.json)
        # Contrasta cada candidato del scrape contra los proyectos del repo.
        # Marca YA_EXISTE / RUIDO / NUEVO en scraper-runs/classification.json
        # y genera stub-nuevos.json para los NUEVOS (esqueleto listo a revisar).
        run: npm run classify-vs-repo

      - name: Notify Telegram (clasificación vs repo)
        # Mensaje específico: 0 nuevos → corto "cobertura al día";
        # ≥1 nuevo → lista numerada + GO request. Skip silencioso sin secrets.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run notify-classification-telegram

      - name: Open scrape-review GitHub Issue
        # Si la clasificación marca >=1 nuevo o >=1 a revisar, abre un GH Issue
        # con label `scrape-review` que el bot developer (SiriusOS) procesará
        # automáticamente (cross-check + analista + consolidación + ping Mario).
        # Skip silencioso si no hay items que requieran revisión humana.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: npm run create-scrape-review-issue

      - name: Open legislacion-update GitHub Issue
        # Si el scraper de Asamblea (vía Delfino) detectó cambios en estado o
        # comisión de algún expediente, abre un GH Issue con label
        # `legislacion-update`. El bot developer valida + consolida + pide GO
        # Mario. Los cambios aceptados se aplican editorialmente a
        # src/data/json/legislacion.json. Skip silencioso si 0 cambios.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: npm run create-legislacion-update-issue

      # 2026-07-10: se eliminaron los steps "Detect changes" y "Create or update PR".
      # El auto-apply de cambios de Asamblea al catálogo (run-all.ts:applyAsambleaChanges)
      # también se retiró. Ahora los cambios detectados por scrapers sólo se surfacean
      # como GH Issues (label `scrape-review` y `legislacion-update`) para revisión
      # manual + GO de Mario por Telegram antes de aplicar editorialmente al JSON.
      # Motivo: el step de PR fallaba con "GitHub Actions is not permitted to create
      # or approve pull requests" (permiso del repo, cambio de política de GitHub);
      # además, el flujo issue-based es más seguro que auto-PR sin revisión previa.

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-reports-${{ github.run_id }}
          path: scraper-runs/
          retention-days: 30
